<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Dois - Listas</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="checklist.css">
<link rel="stylesheet" href="modal.css">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Dois">
<meta name="theme-color" content="#1f7a5c">
</head>
<body>
<div class="phone">

  <!-- TELA 1: grade de listas -->
  <main class="content" id="screen-lists">
    <div class="page-header">
      <h1>✅ Listas</h1>
      <button class="fab-inline" id="add-list-btn" aria-label="Nova lista">+</button>
    </div>
    <div class="lists-grid" id="lists-grid"></div>
  </main>

  <!-- TELA 2: itens de uma lista -->
  <main class="content hidden" id="screen-detail">
    <div class="page-header detail-header">
      <button class="back-btn" id="back-btn" aria-label="Voltar">‹</button>
      <div class="header-title-wrap">
        <h1 id="detail-list-title"></h1>
        <span class="progress-text" id="detail-progress"></span>
      </div>
      <button class="btn-icon del-list-btn" id="del-list-btn" aria-label="Excluir lista">🗑️</button>
    </div>
    <div class="progress-bar-wrap">
      <div class="progress-bar-track"><div class="progress-bar-fill" id="progress-bar"></div></div>
    </div>
    <ul class="items-ul" id="items-list"></ul>
    <button class="add-item-fab" id="add-item-btn">+ Adicionar item</button>
  </main>

  <nav class="bottom-nav">
    <a href="index.html" class="nav-item"><span class="nav-icon">🏠</span><span>Início</span></a>
    <a href="lugares.html" class="nav-item"><span class="nav-icon">📍</span><span>Lugares</span></a>
    <a href="checklist.html" class="nav-item active"><span class="nav-icon">✅</span><span>Lista</span></a>
    <a href="agenda.html" class="nav-item"><span class="nav-icon">📅</span><span>Agenda</span></a>
    <a href="perfil.html" class="nav-item"><span class="nav-icon">👤</span><span>Perfil</span></a>
  </nav>
</div>

<!-- Modal nova lista -->
<div class="modal-overlay" id="list-modal">
  <div class="modal-box">
    <div class="modal-header">
      <h3>Nova lista</h3>
      <button class="modal-close" id="list-modal-close">✕</button>
    </div>
    <form class="modal-form" id="list-form" autocomplete="off">
      <div class="modal-field">
        <label for="list-title-input">Nome da lista</label>
        <input type="text" id="list-title-input" placeholder="Ex: Filmes para ver, Compras..." required>
      </div>
      <div class="modal-field">
        <label for="list-emoji-input">Emoji (opcional)</label>
        <input type="text" id="list-emoji-input" placeholder="🎬 🛒 💊 ✈️" maxlength="4">
      </div>
      <div class="modal-actions">
        <button type="submit" class="btn-primary">Criar lista</button>
      </div>
    </form>
  </div>
</div>

<!-- Modal novo item -->
<div class="modal-overlay" id="item-modal">
  <div class="modal-box">
    <div class="modal-header">
      <h3>Novo item</h3>
      <button class="modal-close" id="item-modal-close">✕</button>
    </div>
    <form class="modal-form" id="item-form" autocomplete="off">
      <div class="modal-field">
        <label for="item-title-input">Item *</label>
        <input type="text" id="item-title-input" placeholder="Ex: Comprar flores" required>
      </div>
      <div class="modal-field">
        <label for="item-due-date">Data limite</label>
        <input type="date" id="item-due-date">
      </div>
      <div class="modal-field">
        <label for="item-assign">Responsável</label>
        <select id="item-assign"></select>
      </div>
      <div class="modal-actions">
        <button type="submit" class="btn-primary">Adicionar</button>
      </div>
    </form>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="supabase-client.js"></script>
<script src="checklist.js"></script>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./service-worker.js').catch(()=>{});
    });
  }
</script>
</body>
</html>
