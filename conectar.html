<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Dois - Conectar</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="conectar.css">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Dois">
<meta name="theme-color" content="#1f7a5c">
</head>
<body>
<div class="phone">
  <main class="content">
    <div class="connect-hero">
      <span class="connect-emoji">💚</span>
      <h1>Conectar casal</h1>
      <p>Gerem um código ou usem o código do(a) parceiro(a) para se conectar.</p>
    </div>

    <div class="tabs" role="tablist">
      <button class="tab active" id="tab-criar-codigo" role="tab" aria-selected="true">Gerar código</button>
      <button class="tab" id="tab-tenho-codigo" role="tab" aria-selected="false">Tenho um código</button>
    </div>

    <div id="panel-criar">
      <div class="panel-card">
        <p class="panel-desc">Gere um código e envie para seu(sua) parceiro(a) usar na aba ao lado.</p>
        <button class="btn-primary" id="btn-gerar-codigo">Gerar código</button>
        <div id="code-box" class="code-box hidden">
          <p class="code-label">Seu código:</p>
          <p class="code-value" id="code-value"></p>
          <button class="btn-copy-code" id="btn-copiar-codigo">Copiar</button>
          <p class="code-hint" id="code-hint">Aguardando seu par entrar com este código...</p>
          <div class="pulse-dots"><span></span><span></span><span></span></div>
        </div>
      </div>
    </div>

    <div id="panel-entrar" class="hidden">
      <div class="panel-card">
        <p class="panel-desc">Digite o código de 6 caracteres gerado pelo(a) seu(sua) parceiro(a).</p>
        <input type="text" id="input-codigo" class="code-input" placeholder="Ex: AB3C9X" maxlength="6" autocomplete="off" autocapitalize="characters" inputmode="text">
        <p class="field-error" id="codigo-error"></p>
        <button class="btn-primary" id="btn-entrar-codigo">Conectar</button>
      </div>
    </div>
  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="supabase-client.js"></script>
<script src="conectar.js"></script>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./service-worker.js').catch(() => {});
    });
  }
</script>
</body>
</html>
