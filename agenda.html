<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Dois - Agenda</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="agenda.css">
<link rel="stylesheet" href="modal.css">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Dois">
<meta name="theme-color" content="#1f7a5c">
</head>
<body>
<div class="phone">
  <main class="content">
    <div class="page-header">
      <h1>📅 Agenda</h1>
      <button class="fab-inline" id="add-event-btn" aria-label="Adicionar evento">+</button>
    </div>
    <div class="cal-card">
      <div class="cal-nav">
        <button class="cal-arrow" id="cal-prev" aria-label="Mês anterior">‹</button>
        <span id="cal-month-label"></span>
        <button class="cal-arrow" id="cal-next" aria-label="Próximo mês">›</button>
      </div>
      <div class="cal-weekdays">
        <span>D</span><span>S</span><span>T</span><span>Q</span><span>Q</span><span>S</span><span>S</span>
      </div>
      <div class="cal-grid" id="cal-grid"></div>
    </div>
    <div class="chip-row" id="cat-filter-row"></div>
    <div id="day-events" style="display:none">
      <div class="section-header">
        <h2 id="day-events-title"></h2>
      </div>
      <div id="day-events-list"></div>
    </div>
    <div class="section-header">
      <h2>Próximos eventos</h2>
      <span id="month-counter" class="counter-badge"></span>
    </div>
    <div id="upcoming-list"></div>
  </main>
  <nav class="bottom-nav">
    <a href="index.html" class="nav-item"><span class="nav-icon">🏠</span><span>Início</span></a>
    <a href="lugares.html" class="nav-item"><span class="nav-icon">📍</span><span>Lugares</span></a>
    <a href="checklist.html" class="nav-item"><span class="nav-icon">✅</span><span>Lista</span></a>
    <a href="agenda.html" class="nav-item active"><span class="nav-icon">📅</span><span>Agenda</span></a>
    <a href="perfil.html" class="nav-item"><span class="nav-icon">👤</span><span>Perfil</span></a>
  </nav>
</div>

<div class="modal-overlay" id="event-modal">
  <div class="modal-box">
    <div class="modal-header">
      <h3 id="event-modal-title">Novo evento</h3>
      <button class="modal-close" id="event-modal-close" aria-label="Fechar">✕</button>
    </div>
    <form class="modal-form" id="event-form" autocomplete="off">
      <div class="modal-field">
        <label for="event-title">Título *</label>
        <input type="text" id="event-title" placeholder="Ex: Jantar romântico" required>
      </div>
      <div class="modal-field">
        <label for="event-category">Categoria</label>
        <select id="event-category">
          <option value="outro">📌 Outro</option>
          <option value="encontro">💑 Encontro</option>
          <option value="aniversario">🎂 Aniversário</option>
          <option value="viagem">✈️ Viagem</option>
          <option value="saida">🍽️ Saída</option>
        </select>
      </div>
      <div class="modal-field row-2">
        <div>
          <label for="event-date">Data *</label>
          <input type="date" id="event-date" required>
        </div>
        <div>
          <label for="event-time">Horário</label>
          <input type="time" id="event-time">
        </div>
      </div>
      <div class="modal-field">
        <label for="event-place">Local</label>
        <input type="text" id="event-place" placeholder="Ex: Restaurante Bossa">
      </div>
      <div class="modal-field">
        <label for="event-maps-url">Link Google Maps</label>
        <input type="url" id="event-maps-url" placeholder="https://maps.google.com/...">
      </div>
      <div class="modal-field">
        <label for="event-recurrence">Repetição</label>
        <select id="event-recurrence">
          <option value="none">Não repetir</option>
          <option value="weekly">Toda semana</option>
          <option value="monthly">Todo mês</option>
          <option value="yearly">Todo ano</option>
        </select>
      </div>
      <div class="modal-field" id="rec-end-field" style="display:none">
        <label for="event-recurrence-end">Repetir até</label>
        <input type="date" id="event-recurrence-end">
      </div>
      <div class="modal-field">
        <label for="event-notes">Observações</label>
        <textarea id="event-notes" placeholder="Reserva feita, levar presente..."></textarea>
      </div>
      <div class="modal-actions">
        <button type="button" class="btn-danger" id="delete-event-btn" style="display:none">Excluir</button>
        <button type="submit" class="btn-primary" id="event-submit-btn">Salvar evento</button>
      </div>
    </form>
  </div>
</div>

<div class="sheet-overlay" id="event-detail-sheet">
  <div class="detail-sheet">
    <div class="sheet-handle"></div>
    <div class="detail-head">
      <div>
        <p class="detail-kicker" id="detail-category"></p>
        <h3 id="detail-title"></h3>
      </div>
      <button class="modal-close" id="detail-close" aria-label="Fechar">✕</button>
    </div>
    <div class="detail-body">
      <div class="detail-row"><span>📅</span><div><strong>Quando</strong><p id="detail-when"></p></div></div>
      <div class="detail-row"><span>📍</span><div><strong>Local</strong><p id="detail-place"></p></div></div>
      <div class="detail-row" id="detail-maps-wrap" style="display:none"><span>🗺️</span><div><strong>Mapa</strong><p><a id="detail-maps-link" target="_blank" rel="noopener">Abrir no Google Maps</a></p></div></div>
      <div class="detail-row"><span>🔁</span><div><strong>Repetição</strong><p id="detail-recurrence"></p></div></div>
      <div class="detail-row"><span>📝</span><div><strong>Observações</strong><p id="detail-notes"></p></div></div>
    </div>
    <div class="detail-actions">
      <button class="btn-secondary" id="detail-edit-btn">Editar</button>
      <button class="btn-danger" id="detail-delete-btn">Excluir</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="supabase-client.js"></script>
<script src="agenda.js"></script>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./service-worker.js')
        .catch((err) => console.warn('SW não registrado:', err));
    });
  }
</script>
</body>
</html>
