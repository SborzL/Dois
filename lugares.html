<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Dois - Lugares</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="lugares.css">
<link rel="stylesheet" href="modal.css">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Dois">
<meta name="theme-color" content="#1f7a5c">
</head>
<body>
<div class="phone">

  <!-- TELA 1: lista de lugares -->
  <main class="content" id="screen-list">
    <div class="page-header">
      <h1>📍 Lugares</h1>
      <button class="fab-inline" id="add-place-btn" aria-label="Adicionar lugar">+</button>
    </div>

    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="search" id="places-search" class="search-input" placeholder="Buscar lugar..." autocomplete="off">
    </div>

    <div class="chip-row status-filters" id="status-filters">
      <button class="chip active" data-status="">Todos</button>
      <button class="chip" data-status="quero ir">📌 Quero ir</button>
      <button class="chip" data-status="agendado">🗓️ Agendado</button>
      <button class="chip" data-status="já fomos">✅ Já fomos</button>
    </div>

    <div class="chip-row" id="cat-filters"></div>

    <div id="places-list"></div>
  </main>

  <!-- TELA 2: detalhe do lugar -->
  <main class="content hidden" id="screen-detail">
    <div class="page-header detail-header">
      <button class="back-btn" id="back-btn" aria-label="Voltar">‹</button>
      <div class="header-title-wrap">
        <h1 id="detail-name"></h1>
        <span id="detail-category-badge"></span>
      </div>
      <button class="btn-icon" id="detail-edit-btn" aria-label="Editar">✏️</button>
    </div>
    <div class="detail-body" id="detail-body"></div>
  </main>

  <nav class="bottom-nav">
    <a href="index.html" class="nav-item"><span class="nav-icon">🏠</span><span>Início</span></a>
    <a href="lugares.html" class="nav-item active"><span class="nav-icon">📍</span><span>Lugares</span></a>
    <a href="roleta.html" class="nav-item"><span class="nav-icon">🎉</span><span>Roleta</span></a>
    <a href="agenda.html" class="nav-item"><span class="nav-icon">📅</span><span>Agenda</span></a>
    <a href="perfil.html" class="nav-item"><span class="nav-icon">👤</span><span>Perfil</span></a>
  </nav>
</div>

<!-- Modal lugar -->
<div class="modal-overlay" id="place-modal">
  <div class="modal-box">
    <div class="modal-header">
      <h3 id="modal-title-text">Novo lugar</h3>
      <button class="modal-close" id="modal-close" aria-label="Fechar">✕</button>
    </div>
    <form class="modal-form" id="place-form" autocomplete="off">
      <div class="modal-field">
        <label for="place-name">Nome *</label>
        <input type="text" id="place-name" placeholder="Ex: Restaurante Bossa" required>
      </div>
      <div class="modal-field">
        <label for="place-address">Endereço</label>
        <input type="text" id="place-address" placeholder="Rua, bairro ou cidade">
      </div>
      <div class="modal-field">
        <label for="place-maps-url">Link Google Maps</label>
        <input type="url" id="place-maps-url" placeholder="https://maps.google.com/...">
      </div>
      <div class="modal-field row-2">
        <div>
          <label for="place-category">Categoria</label>
          <select id="place-category"></select>
        </div>
        <div>
          <label for="place-status">Status</label>
          <select id="place-status"></select>
        </div>
      </div>
      <div class="modal-field">
        <label>Avaliações</label>
        <div class="ratings-grid">
          <div class="rating-row">
            <span class="rating-label">🏡 Ambiente</span>
            <div class="star-group" data-field="rating_ambiente"></div>
          </div>
          <div class="rating-row">
            <span class="rating-label">🍽️ Comida</span>
            <div class="star-group" data-field="rating_comida"></div>
          </div>
          <div class="rating-row">
            <span class="rating-label">🤝 Atendimento</span>
            <div class="star-group" data-field="rating_atendimento"></div>
          </div>
          <div class="rating-row">
            <span class="rating-label">💰 Custo-benefício</span>
            <div class="star-group" data-field="rating_custo"></div>
          </div>
        </div>
      </div>
      <div class="modal-field">
        <label for="place-notes">Observações</label>
        <textarea id="place-notes" placeholder="Como foi a experiência? O que acharam do lugar?" rows="3"></textarea>
      </div>
      <div class="modal-actions">
        <button type="button" class="btn-danger" id="delete-btn" style="display:none">Excluir</button>
        <button type="submit" class="btn-primary">Salvar</button>
      </div>
    </form>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="supabase-client.js"></script>
<script src="lugares.js"></script>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./service-worker.js').catch(()=>{});
    });
  }
</script>
</body>
</html>
