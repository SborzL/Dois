<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Dois - Perfil</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="perfil.css">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Dois">
<meta name="theme-color" content="#1f7a5c">
</head>
<body>
<div class="phone">
  <main class="content">
    <h1 class="page-title">👤 Perfil</h1>

    <section id="couple-section" style="display:none">
      <div class="info-card">
        <p class="info-label">Código do casal</p>
        <div class="code-row">
          <span id="invite-code-display" class="code-big">------</span>
          <button class="btn-copy" id="copy-code-btn">Copiar</button>
        </div>
        <p class="info-sub" id="member-count"></p>
      </div>
    </section>

    <section id="no-couple-section" style="display:none">
      <div class="info-card">
        <p class="info-label">Você ainda não está conectado a um casal.</p>
        <a href="conectar.html" class="btn-primary-block">Conectar agora →</a>
      </div>
    </section>

    <section class="settings-block">
      <p class="settings-label">Seu nome</p>
      <div class="field-row">
        <input type="text" id="profile-name" class="field-input" placeholder="Como quer ser chamado(a)?">
        <button class="btn-save" id="save-profile-btn">Salvar</button>
      </div>
      <p class="field-sub" id="profile-email"></p>
    </section>

    <button class="btn-logout" id="logout-btn">Sair da conta</button>
  </main>

  <nav class="bottom-nav">
    <a href="index.html" class="nav-item"><span class="nav-icon">🏠</span><span>Início</span></a>
    <a href="lugares.html" class="nav-item"><span class="nav-icon">📍</span><span>Lugares</span></a>
    <a href="checklist.html" class="nav-item"><span class="nav-icon">✅</span><span>Lista</span></a>
    <a href="agenda.html" class="nav-item"><span class="nav-icon">📅</span><span>Agenda</span></a>
    <a href="perfil.html" class="nav-item active"><span class="nav-icon">👤</span><span>Perfil</span></a>
  </nav>
</div>

<div id="toast" class="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="supabase-client.js"></script>
<script src="perfil.js"></script>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./service-worker.js')
        .catch((err) => console.warn('SW não registrado:', err));
    });
  }
</script>
</body>
</html>
